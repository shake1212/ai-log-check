[backend]
# Java后端地址
url = http://localhost:8080
# 事件API端点
events_endpoint = /api/events/batch
# 系统信息API端点
system_info_endpoint = /api/system-info/ingest
# 请求超时(秒)
timeout = 30

[collection]
# 收集间隔(秒)
interval = 300
# 最大重试次数
max_retries = 3
# 重试延迟(秒)
retry_delay = 2
# 是否启用缓冲
enable_buffer = true
# 缓冲区大小
buffer_size = 1000

[performance]
# CPU阈值(%)
cpu_threshold = 80.0
# 内存阈值(%)
memory_threshold = 90.0
# 磁盘阈值(%)
disk_threshold = 85.0
# 进程CPU阈值(%) - 只收集超过此值的进程
process_cpu_threshold = 5.0
# 收集的进程数量
top_processes = 20

[logging]
# 日志级别: DEBUG, INFO, WARNING, ERROR, CRITICAL
level = INFO
# 日志文件
file = collector.log
# 日志文件最大大小(字节)
max_bytes = 10485760
# 备份文件数量
backup_count = 5
